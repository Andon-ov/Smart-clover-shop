<!DOCTYPE html>
<html lang="bg">
<head>
    <meta charset="windows-1251">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Clear Storage - Smart Clover Shop</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body>
    <div class="container mt-5">
        <div class="row justify-content-center">
            <div class="col-md-6">
                <div class="card">
                    <div class="card-header bg-warning">
                        <h5 class="mb-0">Изчистване на съхранени данни</h5>
                    </div>
                    <div class="card-body">
                        <p>Този инструмент изчиства всички запазени данни в браузъра:</p>
                        <ul>
                            <li>Текущ потребител (currentUser)</li>
                            <li>Кошница (cart)</li>
                            <li>История на поръчки (orders)</li>
                        </ul>
                        
                        <div class="alert alert-info">
                            <strong>Текущо състояние:</strong>
                            <div id="currentState" class="mt-2"></div>
                        </div>
                        
                        <button class="btn btn-warning w-100" onclick="clearStorage()">
                            Изчисти всички данни
                        </button>
                        
                        <a href="index.html" class="btn btn-secondary w-100 mt-2">
                            Обратно към магазина
                        </a>
                    </div>
                </div>
            </div>
        </div>
    </div>
    
    <script>
        function showCurrentState() {
            const currentUser = localStorage.getItem('currentUser');
            const cart = localStorage.getItem('cart');
            const orders = localStorage.getItem('orders');
            
            let html = '<ul class="mb-0">';
            html += `<li>Потребител: ${currentUser ? JSON.parse(currentUser).name : 'Няма'}</li>`;
            html += `<li>Кошница: ${cart ? JSON.parse(cart).length + ' продукта' : 'Празна'}</li>`;
            html += `<li>Поръчки: ${orders ? JSON.parse(orders).length : '0'}</li>`;
            html += '</ul>';
            
            document.getElementById('currentState').innerHTML = html;
        }
        
        function clearStorage() {
            if (confirm('Сигурни ли сте, че искате да изчистите всички данни?')) {
                localStorage.removeItem('currentUser');
                localStorage.removeItem('cart');
                localStorage.removeItem('orders');
                
                alert('Данните са изчистени успешно!');
                showCurrentState();
                
                setTimeout(() => {
                    window.location.href = 'index.html';
                }, 1000);
            }
        }
        
        // Show current state on load
        showCurrentState();
    </script>
</body>
</html>
